name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Windows / Node 24
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install site dependencies
        run: npm --prefix site ci --ignore-scripts

      - name: Verify source, plugin, receipts, and site
        run: npm run verify

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit site dependencies
        run: npm --prefix site audit --audit-level=high

      - name: Confirm generated artifacts are committed
        run: git diff --exit-code
