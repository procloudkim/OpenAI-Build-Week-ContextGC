name: Bug report
description: Report a reproducible ContextGC failure without private task data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste transcripts, Task Frames, archive objects, credentials,
        session/account/checkpoint IDs, or complete private paths. An opaque
        storeId may be included only when correlation is necessary. Use
        SECURITY.md when you suspect unauthorized disclosure, path escape,
        integrity bypass, or persistent prompt injection; ordinary validation
        errors remain appropriate here with synthetic input.

  - type: input
    id: versions
    attributes:
      label: Versions
      description: Applicable ContextGC, Codex CLI/app, Node.js, OS, shell, and installation method
      placeholder: ContextGC x.y.z; Codex CLI x.y.z; Node x.y.z; OS and shell; repository or plugin install
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Failing surface
      options:
        - Plugin installation or discovery
        - Hook lifecycle
        - MCP tool
        - Bundled CLI
        - Archive, checkpoint, rehydrate, or restore
        - Benchmark or receipt
        - Demo site
        - Documentation
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Minimal sanitized reproduction
      description: Include exact commands or actions and synthetic inputs only.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected observable
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual observable
      description: Include the error class and sanitized message, not raw stored data.
    validations:
      required: true

  - type: textarea
    id: state
    attributes:
      label: Sanitized state
      description: Optional enabled/trust state, latestCheckpointStatus, dataDirSource/boundary, receipt provenance, and whether synthetic input reproduces it. Do not include paths or stored content.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed transcripts, secrets, raw session/account/checkpoint identifiers, proprietary data, and private absolute paths.
          required: true
        - label: I do not suspect an unauthorized disclosure, path escape, integrity bypass, or persistent prompt injection that belongs in SECURITY.md.
          required: true
