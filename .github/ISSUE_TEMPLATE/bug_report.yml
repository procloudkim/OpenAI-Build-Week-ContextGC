name: Bug report
description: Report a reproducible ContextGC failure without private task data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste transcripts, Task Frames, archive objects, credentials,
        session IDs, account IDs, or complete private paths. Use SECURITY.md
        for integrity, disclosure, path, or prompt-injection vulnerabilities.

  - type: input
    id: versions
    attributes:
      label: Versions
      description: ContextGC, Codex CLI, Node.js, Windows version
      placeholder: ContextGC 0.1.5; Codex CLI 0.144.5; Node 24.18.0; Windows 11
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Failing surface
      options:
        - Plugin installation or discovery
        - Hook lifecycle
        - MCP tool
        - Bundled CLI
        - Archive, checkpoint, rehydrate, or restore
        - Benchmark or receipt
        - Demo site
        - Documentation
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Minimal sanitized reproduction
      description: Include exact commands or actions and synthetic inputs only.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected observable
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual observable
      description: Include the error class and sanitized message, not raw stored data.
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed transcripts, secrets, identifiers, proprietary data, and private absolute paths.
          required: true
        - label: This report does not describe a vulnerability that belongs in SECURITY.md.
          required: true
